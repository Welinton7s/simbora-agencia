<!DOCTYPE html>
<html lang="pt-Br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <title>Simbora - Recuperar Senha</title>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main>
    <section id="login">
        <div class="container">
            <div class="d-flex flex-column justify-content-center align-items-center text-center">
                <h2>Recuperar Senha</h2>
                <div th:if="${mensagemSucesso}" class="alert alert-success mt-2" style="width: 20rem;" th:text="${mensagemSucesso}"></div>
                <div th:if="${mensagemErro}" class="alert alert-danger mt-2" style="width: 20rem;" th:text="${mensagemErro}"></div>
                <form th:action="@{/clientes/recuperar-senha}" method="post" class="card mx-auto" style="width: 20rem; background-color: #242424; border: 0.10rem solid #828282; border-radius: 0.5rem;">
                    <div class="form-group card-body d-flex flex-column align-items-center">
                        <p class="text-center mb-3" style="color: #fff;">Digite seu e-mail cadastrado e enviaremos as instruções para redefinir sua senha.</p>
                        <label for="email" style="color: #fff;">Email</label>
                        <input id="email" name="email" type="email" class="form-control" style="background-color: #121212; border: 0.10rem solid #2A2B2C; color: #fff;" required>
                        <button type="submit" class="btn btn-success mt-2">Enviar</button>
                        <a th:href="@{/clientes/login}" class="btn-novaSenha">Voltar ao login</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
