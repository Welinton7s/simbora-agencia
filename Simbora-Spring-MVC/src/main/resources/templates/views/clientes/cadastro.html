<!DOCTYPE html>
<html lang="pt-Br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <title>Simbora</title>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main>
    <section id="cadastro">
        <div class="container">
            <div class="d-flex flex-column justify-content-center align-items-center text-center">
                <h2>Cadastro</h2>
                <div th:if="${mensagemErro}" class="alert alert-danger mt-2" style="width: 20rem;" th:text="${mensagemErro}"></div>
                <form id="formCadastro" th:action="@{/clientes/cadastro}" method="post" class="card mx-auto" style="width: 20rem; background-color: #242424; border: 0.10rem solid #828282; border-radius: 0.5rem;">
                    <div class="form-group card-body d-flex flex-column align-items-center">
                        <label for="nome" style="color: #fff;">Nome</label>
                        <input id="nome" name="nome" type="text" class="form-control" style="background-color: #121212; border: 0.10rem solid #2A2B2C; color: #fff;" required>
                        <label for="email" style="color: #fff;">Email</label>
                        <input id="email" name="email" type="email" class="form-control" style="background-color: #121212; border: 0.10rem solid #2A2B2C; color: #fff;" required>
                        <label for="senha" style="color: #fff;">Senha</label>
                        <input id="senha" name="senha" type="password" class="form-control" style="background-color: #121212; border: 0.10rem solid #2A2B2C; color: #fff;" required>
                        <label for="confirmarSenha" style="color: #fff;">Confirmar Senha</label>
                        <input id="confirmarSenha" type="password" class="form-control" style="background-color: #121212; border: 0.10rem solid #2A2B2C; color: #fff;" required>
                        <div id="erroSenha" class="text-danger mt-1" style="display:none; font-size: 0.85rem;">
                            As senhas não coincidem.
                        </div>
                        <label for="telefone" style="color: #fff;">Telefone</label>
                        <input id="telefone" name="telefone" type="tel" class="form-control" style="background-color: #121212; border: 0.10rem solid #2A2B2C; color: #fff;" required>
                        <button type="submit" class="btn btn-success mt-2">Cadastrar</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('formCadastro').addEventListener('submit', function (e) {
        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmarSenha').value;
        const erro = document.getElementById('erroSenha');
        if (senha !== confirmar) {
            e.preventDefault();
            erro.style.display = 'block';
        } else {
            erro.style.display = 'none';
        }
    });
</script>
</body>
</html>
