<!DOCTYPE html>
<html lang="pt-Br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <title>Simbora - Minhas Passagens</title>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main>
    <section id="passagens" style="min-height: 90vh;">
        <div class="container text-center">
            <h2 class="pt-4 text-white">Minhas Passagens</h2>
            <div class="row justify-content-center mt-4">
                <p class="text-white" th:if="${#lists.isEmpty(listaPassagens)}">Nenhuma passagem encontrada.</p>

                <div class="col-md-4 mb-3" th:each="p : ${listaPassagens}">
                    <div class="card border-dark shadow">
                        <div class="card-body text-center">
                            <h5 class="card-title">
                                ✈ <span th:text="${p.destino.partida}"></span> → <span th:text="${p.destino.destino}"></span>
                            </h5>
                            <hr>
                            <p class="card-text"><strong>Data da viagem:</strong> <span th:text="${p.dataViagem}"></span></p>
                            <p class="card-text"><strong>Preço:</strong> R$ <span th:text="${#numbers.formatDecimal(p.preco, 1, 2)}"></span></p>
                            <div class="d-flex justify-content-center gap-2 mt-3">
                                <button class="btn btn-primary btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalEditar"
                                        th:attr="data-id=${p.id},data-partida=${p.destino.partida},data-destino=${p.destino.destino},data-data=${p.dataViagem}">
                                    Editar
                                </button>
                                <button class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalExcluir"
                                        th:attr="data-id=${p.id},data-partida=${p.destino.partida},data-destino=${p.destino.destino}">
                                    Excluir
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- Modal Editar -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Passagem</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/passagens/editar}" method="post">
                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">
                    <div class="mb-3">
                        <label class="form-label">Partida</label>
                        <input type="text" class="form-control" name="partida" id="editPartida" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Destino</label>
                        <input type="text" class="form-control" name="destino" id="editDestino" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data da Viagem</label>
                        <input type="text" class="form-control" name="dataViagem" id="editData" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Excluir -->
<div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar Exclusão</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p>Deseja excluir a passagem</p>
                <strong id="infoExcluir"></strong>
                <p class="text-danger mt-2">Esta ação não pode ser desfeita.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="formExcluir" th:action="@{/passagens/excluir}" method="post">
                    <input type="hidden" name="id" id="excluirId">
                    <button type="submit" class="btn btn-danger">Excluir</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modalEditar = document.getElementById('modalEditar');
    modalEditar.addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        document.getElementById('editId').value = btn.getAttribute('data-id');
        document.getElementById('editPartida').value = btn.getAttribute('data-partida');
        document.getElementById('editDestino').value = btn.getAttribute('data-destino');
        document.getElementById('editData').value = btn.getAttribute('data-data');
    });

    const modalExcluir = document.getElementById('modalExcluir');
    modalExcluir.addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        const id = btn.getAttribute('data-id');
        const partida = btn.getAttribute('data-partida');
        const destino = btn.getAttribute('data-destino');
        document.getElementById('infoExcluir').textContent = partida + ' → ' + destino;
        document.getElementById('excluirId').value = id;
    });
</script>
</body>
</html>
