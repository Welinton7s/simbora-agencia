<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Simbora - Minhas Passagens</title>
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark">
                <div class="container-fluid">
                    <div class="navbar-brand d-flex align-items-center">
                        <a href="../HTML/index.html">SIMBORA</a>
                        <img src="../imagens/travel-6913775_1280.png" alt="Logo do Simbora">
                    </div>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse d-lg-flex justify-content-end" id="navbarSupportedContent">
                        <ul class="navbar-nav">
                            <li class="nav-item"><a class="nav-link" href="../HTML/index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="../HTML/destinos.html">Destinos</a></li>
                            <li class="nav-item"><a class="nav-link" href="../HTML/promocao.html">Promoções</a></li>
                            <li class="nav-item"><a class="nav-link" href="../HTML/contato.html">Contato</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section id="passagens" style="min-height: 90vh;">
            <div class="container text-center">
                <h2 class="pt-4 text-white">Minhas Passagens</h2>
                <div class="row justify-content-center mt-4">
                    <div class="col-md-4 mb-3">
                        <div class="card border-dark shadow">
                            <div class="card-body text-center">
                                <h5 class="card-title">✈ Orlando → Colinas</h5>
                                <hr>
                                <p class="card-text"><strong>Data da viagem:</strong> 2026-06-20</p>
                                <p class="card-text"><strong>Preço:</strong> R$ 223,78</p>
                                <div class="d-flex justify-content-center gap-2 mt-3">
                                    <button class="btn btn-primary btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalEditar">
                                        Editar
                                    </button>
                                    <button class="btn btn-danger btn-sm"
                                        onclick="return confirm('Deseja excluir esta passagem?')">
                                        Excluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Editar -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Passagem</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form action="">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Partida</label>
                            <input type="text" class="form-control" name="partida" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Destino</label>
                            <input type="text" class="form-control" name="destino" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data da Viagem</label>
                            <input type="date" class="form-control" name="dataViagem" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="d-flex justify-content-center align-items-center text-center">
        <div class="container">
            <p>Feito com <span>❤</span> por Welinton</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
