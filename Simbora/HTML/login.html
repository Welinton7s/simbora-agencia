<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Simbora</title>
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark">
                <div class="container-fluid">
                    <div class="navbar-brand d-flex align-items-center">
                        <a href="../HTML/index.html">SIMBORA</a>
                        <img src="../imagens/travel-6913775_1280.png" alt="Logo do Simbora">
                    </div>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse d-lg-flex justify-content-end" id="navbarSupportedContent">
                        <ul class="navbar-nav">
                            <li class="nav-item"><a class="nav-link" href="../HTML/index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="../HTML/destinos.html">Destinos</a></li>
                            <li class="nav-item"><a class="nav-link" href="../HTML/promocao.html">Promoções</a></li>
                            <li class="nav-item"><a class="nav-link" href="../HTML/contato.html">Contato</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section id="login">
            <div class="container">
                <div class="d-flex flex-column justify-content-center align-items-center text-center">
                    <h2>Acessar</h2>
                    <form action="../HTML/destinos.html" method="POST" class="card mx-auto">
                        <div class="form-group card-body d-flex flex-column align-items-center">
                            <label for="email">Email</label>
                            <input id="email" name="email" type="email" required class="form-control">
                            <label for="senha">Senha</label>
                            <input id="senha" name="senha" type="password" required class="form-control">
                            <button class="btn btn-success">Entrar</button>
                            <a href="../HTML/recuperar-senha.html" class="btn-novaSenha">Esqueceu sua senha?</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="d-flex justify-content-center align-items-center text-center">
        <div class="container">
            <p>Feito com <span>❤</span> por Welinton</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
